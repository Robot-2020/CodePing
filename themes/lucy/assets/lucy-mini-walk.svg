<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .walk-anim { animation: walk-bounce 0.4s infinite ease-in-out; }
      @keyframes walk-bounce { 0%, 100% { transform: translateX(-2px) rotate(-10deg); } 50% { transform: translateX(2px) rotate(-14deg); } }
    </style>
    <clipPath id="bodyClip"><circle cx="8" cy="8" r="14"/></clipPath>
  </defs>
  <g class="walk-anim">
    <g clip-path="url(#bodyClip)">
      <circle cx="-8" cy="2" r="22" fill="#E65100"/>
      <circle cx="16" cy="12" r="20" fill="#2D2D2D"/>
    </g>
    <g fill="#FFFFFF"><circle cx="5" cy="6" r="1"/><circle cx="11" cy="6" r="1"/></g>
    <path d="M 5.5 11 Q 8 13 10.5 11" stroke="#FFFFFF" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  </g>
</svg>
