<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .breathe-anim { transform-origin: 8px 8px; animation: breathe 3.2s infinite ease-in-out; }
      .page { transform-origin: 0 50%; animation: page-turn 4s infinite ease-in-out; }
      .eyes-read { animation: read-scan 4s infinite ease-in-out; }
      @keyframes breathe { 0%, 100% { transform: scale(1, 1); } 50% { transform: scale(1.02, 0.98); } }
      @keyframes page-turn { 0%, 90%, 100% { transform: rotateY(0deg); } 95% { transform: rotateY(-30deg); } }
      @keyframes read-scan {
        0%, 100% { transform: translate(-0.5px, 0.5px); }
        25% { transform: translate(0.5px, 0.5px); }
        50% { transform: translate(-0.5px, 1px); }
        75% { transform: translate(0.5px, 1px); }
      }
    </style>
    <clipPath id="bodyClip"><circle cx="8" cy="8" r="14"/></clipPath>
  </defs>
  <ellipse cx="8" cy="22" rx="10" ry="2" fill="#000000" opacity="0.3"/>
  <g transform="translate(-8, 12)">
    <rect x="0" y="0" width="14" height="10" fill="#8B4513" rx="0.5"/>
    <rect x="1" y="1" width="5.5" height="8" fill="#FFF8DC"/>
    <rect x="7.5" y="1" width="5.5" height="8" fill="#FFF8DC" class="page"/>
    <line x1="7" y1="0" x2="7" y2="10" stroke="#6B3E26" stroke-width="0.5"/>
    <g fill="#333" opacity="0.3">
      <rect x="2" y="2" width="4" height="0.5"/><rect x="2" y="3.5" width="3.5" height="0.5"/><rect x="2" y="5" width="4" height="0.5"/>
      <rect x="8.5" y="2" width="4" height="0.5"/><rect x="8.5" y="3.5" width="3.5" height="0.5"/><rect x="8.5" y="5" width="4" height="0.5"/>
    </g>
  </g>
  <g class="breathe-anim">
    <g clip-path="url(#bodyClip)">
      <circle cx="-8" cy="2" r="22" fill="#E65100"/>
      <circle cx="16" cy="12" r="20" fill="#2D2D2D"/>
    </g>
    <g class="eyes-read" fill="#FFFFFF"><circle cx="5" cy="6" r="1"/><circle cx="11" cy="6" r="1"/></g>
    <ellipse cx="8" cy="11" rx="1" ry="0.5" fill="#FFFFFF" opacity="0.5"/>
  </g>
</svg>
