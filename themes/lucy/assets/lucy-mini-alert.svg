<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .alert-pulse { transform-origin: 8px 8px; animation: alert 0.5s infinite ease-in-out; }
      .eyes-wide { animation: alert-blink 0.8s infinite ease-in-out; }
      @keyframes alert { 0%, 100% { transform: scale(1) rotate(-12deg); } 50% { transform: scale(1.05) rotate(-12deg); } }
      @keyframes alert-blink { 0%, 70%, 100% { transform: scaleY(1); } 75% { transform: scaleY(0.1); } }
    </style>
    <clipPath id="bodyClip"><circle cx="8" cy="8" r="14"/></clipPath>
  </defs>
  <g class="alert-pulse">
    <g clip-path="url(#bodyClip)">
      <circle cx="-8" cy="2" r="22" fill="#E65100"/>
      <circle cx="16" cy="12" r="20" fill="#2D2D2D"/>
    </g>
    <g class="eyes-wide" fill="#FFFFFF"><circle cx="5" cy="6" r="1.3"/><circle cx="11" cy="6" r="1.3"/></g>
    <ellipse cx="8" cy="12" rx="1.3" ry="1.3" fill="#3D3D3D"/>
  </g>
  <text x="20" y="-5" font-family="Arial" font-size="8" font-weight="bold" fill="#FF6B6B">!</text>
</svg>
