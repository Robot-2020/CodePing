<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .sweep-body { transform-origin: 8px 20px; animation: sweep-lean 1s infinite ease-in-out; }
      .broom { transform-origin: 20px 15px; animation: broom-sweep 1s infinite ease-in-out; }
      .dust { opacity: 0; animation: dust-fly 1s infinite ease-out; }
      .d1 { animation-delay: 0s; } .d2 { animation-delay: 0.3s; } .d3 { animation-delay: 0.6s; }
      @keyframes sweep-lean { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
      @keyframes broom-sweep { 0%, 100% { transform: rotate(-20deg); } 50% { transform: rotate(20deg); } }
      @keyframes dust-fly { 0% { transform: translate(0, 0); opacity: 0; } 20% { opacity: 0.6; } 100% { transform: translate(-15px, -8px); opacity: 0; } }
    </style>
    <clipPath id="bodyClip"><circle cx="8" cy="8" r="14"/></clipPath>
  </defs>
  <ellipse cx="8" cy="22" rx="10" ry="2" fill="#000000" opacity="0.3"/>
  <g fill="#A0A0A0">
    <circle class="dust d1" cx="-5" cy="18" r="0.7"/>
    <circle class="dust d2" cx="-8" cy="16" r="0.8"/>
    <circle class="dust d3" cx="-3" cy="17" r="1.2"/>
  </g>
  <g class="sweep-body">
    <g clip-path="url(#bodyClip)">
      <circle cx="-8" cy="2" r="22" fill="#ff7d10"/>
      <circle cx="17" cy="13" r="19" fill="#0a0310"/>
    </g>
    <g fill="#FFFFFF"><circle cx="5" cy="6" r="0.7"/><circle cx="11" cy="6" r="0.7"/></g>
    <path d="M 6 11 Q 8 12.5 10 11" stroke="#FFFFFF" stroke-width="0.5" fill="none" stroke-linecap="round"/>
  </g>
  <g class="broom">
    <rect x="18" y="-5" width="1.5" height="20" fill="#8B4513"/>
    <rect x="15" y="14" width="8" height="4" fill="#DAA520" rx="1"/>
    <g fill="#CD853F"><rect x="15" y="17" width="1" height="3"/><rect x="17" y="17" width="1" height="3"/><rect x="19" y="17" width="1" height="3"/><rect x="21" y="17" width="1" height="3"/></g>
  </g>
</svg>
