<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .collapse {
        transform-origin: 8px 20px;
        animation: collapse 2s ease-out forwards;
      }
      @keyframes collapse {
        0% { transform: scale(1, 1) translateY(0); }
        30% { transform: scale(1.1, 0.9) translateY(2px); }
        60% { transform: scale(0.9, 1.1) translateY(-2px); }
        80% { transform: scale(1.15, 0.7) translateY(5px); }
        100% { transform: scale(1.3, 0.5) translateY(8px); }
      }
    </style>
    <clipPath id="bodyClip"><circle cx="8" cy="8" r="14"/></clipPath>
  </defs>
  <ellipse cx="8" cy="22" rx="14" ry="2.5" fill="#000000" opacity="0.3"/>
  <g class="collapse">
    <g clip-path="url(#bodyClip)">
      <circle cx="-8" cy="2" r="22" fill="#ff7d10"/>
      <circle cx="17" cy="13" r="19" fill="#0a0310"/>
    </g>
    <g fill="#FFFFFF">
      <rect x="3" y="6" width="3" height="0.8" rx="0.4"/>
      <rect x="10" y="6" width="3" height="0.8" rx="0.4"/>
    </g>
    <ellipse cx="8" cy="10" rx="1" ry="0.5" fill="#FFFFFF" opacity="0.5"/>
  </g>
</svg>
