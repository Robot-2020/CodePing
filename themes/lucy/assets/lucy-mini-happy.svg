<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .happy-bounce { transform-origin: 8px 15px; animation: bounce 0.8s infinite ease-in-out; }
      @keyframes bounce { 0%, 100% { transform: translateY(0) rotate(-12deg); } 50% { transform: translateY(-3px) rotate(-12deg); } }
    </style>
    <clipPath id="bodyClip"><circle cx="8" cy="8" r="14"/></clipPath>
  </defs>
  <g class="happy-bounce">
    <g clip-path="url(#bodyClip)">
      <circle cx="-8" cy="2" r="22" fill="#E65100"/>
      <circle cx="16" cy="12" r="20" fill="#2D2D2D"/>
    </g>
    <g fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round">
      <path d="M 3.5 6 Q 5 4 6.5 6"/>
      <path d="M 9.5 6 Q 11 4 12.5 6"/>
    </g>
    <path d="M 4.5 10.5 Q 8 14 11.5 10.5" stroke="#FFFFFF" stroke-width="0.9" fill="none" stroke-linecap="round"/>
  </g>
  <circle cx="22" cy="-5" r="1.5" fill="#FFD700" opacity="0.8"/>
</svg>
