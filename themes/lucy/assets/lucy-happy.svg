<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .bounce-anim {
        transform-box: fill-box;
        transform-origin: 50% 100%;
        animation: bounce 1s infinite ease-in-out;
      }
      .shadow-anim {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        animation: shadow 1s infinite ease-in-out;
      }
      .spark-center { opacity: 0; animation: flash-center 1.5s infinite step-end; animation-delay: var(--delay, 0s); }
      .spark-outer { opacity: 0; animation: flash-outer 1.5s infinite step-end; animation-delay: var(--delay, 0s); }
      @keyframes bounce {
        0%, 15%, 100% { transform: translateY(0) scaleY(1); }
        20% { transform: translateY(0) scaleY(0.88); }
        40% { transform: translateY(-8px) scaleY(1.05); }
        50% { transform: translateY(-10px) scaleY(1); }
        60% { transform: translateY(-8px) scaleY(1.05); }
        80% { transform: translateY(0) scaleY(0.88); }
        85% { transform: translateY(0) scaleY(1); }
      }
      @keyframes shadow {
        0%, 15%, 100% { transform: scale(1); opacity: 0.3; }
        40%, 60% { transform: scale(0.5); opacity: 0.1; }
        80% { transform: scale(1.1); opacity: 0.4; }
      }
      @keyframes flash-center {
        0% { opacity: 0; } 10% { opacity: 1; } 30%, 100% { opacity: 0; }
      }
      @keyframes flash-outer {
        0% { opacity: 0; } 20% { opacity: 1; } 40%, 100% { opacity: 0; }
      }
    </style>
    <clipPath id="bodyClip"><circle cx="8" cy="8" r="14"/></clipPath>
    <g id="px-sparkle">
      <circle class="spark-center" cx="0" cy="0" r="1"/>
      <g class="spark-outer">
        <circle cx="0" cy="-2" r="0.5"/>
        <circle cx="0" cy="2" r="0.5"/>
        <circle cx="-2" cy="0" r="0.5"/>
        <circle cx="2" cy="0" r="0.5"/>
      </g>
    </g>
  </defs>
  <ellipse class="shadow-anim" cx="8" cy="22" rx="10" ry="2" fill="#000000"/>
  <g class="sparkles">
    <use href="#px-sparkle" x="-8" y="-2" fill="#FFD700" style="--delay: 0.0s"/>
    <use href="#px-sparkle" x="24" y="-4" fill="#FFA000" style="--delay: 0.3s"/>
    <use href="#px-sparkle" x="26" y="14" fill="#FFF59D" style="--delay: 0.6s"/>
    <use href="#px-sparkle" x="-10" y="16" fill="#FFC107" style="--delay: 0.9s"/>
    <use href="#px-sparkle" x="8" y="-12" fill="#FFF59D" style="--delay: 1.2s"/>
  </g>
  <g class="bounce-anim">
    <g clip-path="url(#bodyClip)">
      <circle cx="-8" cy="2" r="22" fill="#E65100"/>
      <circle cx="16" cy="12" r="20" fill="#2D2D2D"/>
    </g>
    <g fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round">
      <path d="M 3.5 6 Q 5 4 6.5 6"/>
      <path d="M 9.5 6 Q 11 4 12.5 6"/>
    </g>
    <path d="M 4 11 Q 8 16 12 11" stroke="#FFFFFF" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>
</svg>
