<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .breathe-anim {
        transform-origin: 8px 8px;
        animation: breathe 3.2s infinite ease-in-out;
      }
      .yawn-mouth {
        transform-origin: 8px 11px;
        animation: yawn 3s infinite ease-in-out;
      }
      .yawn-eyes { animation: yawn-squint 3s infinite ease-in-out; }
      @keyframes breathe {
        0%, 100% { transform: scale(1, 1); }
        50% { transform: scale(1.02, 0.98); }
      }
      @keyframes yawn {
        0%, 20%, 80%, 100% { transform: scale(1, 0.3); }
        40%, 60% { transform: scale(1.2, 1.5); }
      }
      @keyframes yawn-squint {
        0%, 20%, 80%, 100% { transform: scaleY(1); }
        40%, 60% { transform: scaleY(0.2); }
      }
    </style>
    <clipPath id="bodyClip"><circle cx="8" cy="8" r="14"/></clipPath>
  </defs>
  <ellipse cx="8" cy="22" rx="10" ry="2" fill="#000000" opacity="0.3"/>
  <g class="breathe-anim">
    <g clip-path="url(#bodyClip)">
      <circle cx="-8" cy="2" r="22" fill="#ff7d10"/>
      <circle cx="17" cy="13" r="19" fill="#0a0310"/>
    </g>
    <g class="yawn-eyes" fill="#FFFFFF">
      <circle cx="5" cy="6" r="0.7"/>
      <circle cx="11" cy="6" r="0.7"/>
    </g>
    <g class="yawn-mouth">
      <ellipse cx="8" cy="11" rx="2" ry="2.5" fill="#3D3D3D"/>
      <ellipse cx="8" cy="11" rx="1.3" ry="1.8" fill="#2A2A2A"/>
    </g>
  </g>
</svg>
