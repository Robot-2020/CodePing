<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .conduct-body { transform-origin: 8px 20px; animation: conduct-sway 1.5s infinite ease-in-out; }
      .baton { transform-origin: 22px 5px; animation: baton-wave 1.5s infinite ease-in-out; }
      .note { opacity: 0; animation: note-float 2s infinite ease-out; }
      .n1 { animation-delay: 0s; } .n2 { animation-delay: 0.7s; } .n3 { animation-delay: 1.4s; }
      @keyframes conduct-sway { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
      @keyframes baton-wave { 0%, 100% { transform: rotate(-30deg); } 25% { transform: rotate(20deg); } 50% { transform: rotate(-20deg); } 75% { transform: rotate(30deg); } }
      @keyframes note-float { 0% { transform: translate(0, 0); opacity: 0; } 20% { opacity: 1; } 100% { transform: translate(5px, -15px); opacity: 0; } }
    </style>
    <clipPath id="bodyClip"><circle cx="8" cy="8" r="14"/></clipPath>
  </defs>
  <ellipse cx="8" cy="22" rx="10" ry="2" fill="#000000" opacity="0.3"/>
  <g fill="#4ECDC4">
    <text class="note n1" x="-8" y="-5" font-size="6">♪</text>
    <text class="note n2" x="24" y="-8" font-size="5">♫</text>
    <text class="note n3" x="-5" y="0" font-size="5">♪</text>
  </g>
  <g class="conduct-body">
    <g clip-path="url(#bodyClip)">
      <circle cx="-8" cy="2" r="22" fill="#E65100"/>
      <circle cx="16" cy="12" r="20" fill="#2D2D2D"/>
    </g>
    <g fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round">
      <path d="M 3.5 5.5 Q 5 4 6.5 5.5"/>
      <path d="M 9.5 5.5 Q 11 4 12.5 5.5"/>
    </g>
    <path d="M 5.5 10.5 Q 8 13 10.5 10.5" stroke="#FFFFFF" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  </g>
  <g class="baton">
    <line x1="20" y1="5" x2="28" y2="-5" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="28" cy="-5" r="0.8" fill="#FFFFFF"/>
  </g>
</svg>
