<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .body-bounce {
        transform-origin: 8px 20px;
        animation: body-bounce 0.4s infinite ease-in-out;
      }

      .eyes-happy {
        animation: happy-blink 3s infinite ease-in-out;
      }

      .code-line { transform-box: fill-box; transform-origin: left center; }
      .cl1 { animation: cl1 5s infinite; }
      .cl2 { animation: cl2 5s infinite; }
      .cl3 { animation: cl3 5s infinite; }

      .key-flash { opacity: 0; }
      .kf1 { animation: kflash 0.5s infinite; }
      .kf2 { animation: kflash 0.7s infinite; animation-delay: -0.2s; }
      .kf3 { animation: kflash 0.6s infinite; animation-delay: -0.35s; }

      .shadow-anim {
        transform-origin: 8px 22px;
        animation: shadow-bob 0.4s infinite ease-in-out;
      }

      /* Sparkle for cute effect */
      .sparkle { opacity: 0; animation: sparkle-pop 2s infinite ease-out; }
      .sp1 { animation-delay: 0s; }
      .sp2 { animation-delay: 0.7s; }
      .sp3 { animation-delay: 1.4s; }

      /* Heart particles */
      .heart { opacity: 0; animation: heart-float 3s infinite ease-out; }
      .h1 { animation-delay: 0.5s; }
      .h2 { animation-delay: 1.5s; }

      @keyframes body-bounce {
        0%, 100% { transform: translateY(0) rotate(-1deg); }
        50% { transform: translateY(0.5px) rotate(1deg); }
      }
      
      @keyframes shadow-bob {
        0%, 100% { transform: scaleX(1); opacity: 0.3; }
        50% { transform: scaleX(1.03); opacity: 0.35; }
      }

      @keyframes happy-blink {
        0%, 45%, 55%, 100% { transform: scaleY(1); }
        50% { transform: scaleY(0.1); }
      }

      @keyframes cl1 {
        0% { transform: scaleX(0); opacity: 0; }
        5% { opacity: 1; }
        15%, 70% { transform: scaleX(1); opacity: 1; }
        80% { transform: scaleX(1) translateY(-2px); opacity: 0; }
        81%, 100% { transform: scaleX(0); opacity: 0; }
      }
      @keyframes cl2 {
        0%, 16% { transform: scaleX(0); opacity: 0; }
        20% { opacity: 1; }
        30%, 75% { transform: scaleX(1); opacity: 1; }
        85% { transform: scaleX(1) translateY(-2px); opacity: 0; }
        86%, 100% { transform: scaleX(0); opacity: 0; }
      }
      @keyframes cl3 {
        0%, 31% { transform: scaleX(0); opacity: 0; }
        35% { opacity: 1; }
        45%, 80% { transform: scaleX(1); opacity: 1; }
        90% { transform: scaleX(1) translateY(-2px); opacity: 0; }
        91%, 100% { transform: scaleX(0); opacity: 0; }
      }

      @keyframes kflash {
        0%, 60%, 100% { opacity: 0; }
        30% { opacity: 0.9; }
      }

      @keyframes sparkle-pop {
        0% { transform: scale(0); opacity: 0; }
        20% { transform: scale(1.2); opacity: 1; }
        40% { transform: scale(0.8); opacity: 0.8; }
        100% { transform: scale(0); opacity: 0; }
      }

      @keyframes heart-float {
        0% { transform: translateY(0) scale(0.5); opacity: 0; }
        20% { opacity: 0.8; }
        100% { transform: translateY(-15px) scale(1); opacity: 0; }
      }
    </style>
    <clipPath id="bodyClip">
      <circle cx="8" cy="8" r="14"/>
    </clipPath>
  </defs>

  <ellipse class="shadow-anim" cx="8" cy="22" rx="10" ry="2" fill="#000" opacity="0.3"/>

  <!-- Cute sparkles -->
  <g fill="#FFD700">
    <circle class="sparkle sp1" cx="-6" cy="-3" r="1"/>
    <circle class="sparkle sp2" cx="22" cy="0" r="1.2"/>
    <circle class="sparkle sp3" cx="-4" cy="10" r="0.7"/>
  </g>

  <!-- Floating hearts -->
  <g fill="#FF6B9D">
    <text class="heart h1" x="20" y="5" font-size="5">♥</text>
    <text class="heart h2" x="-8" y="8" font-size="4">♥</text>
  </g>

  <!-- Mini Screen (cuter, rounded) -->
  <g id="screen" transform="translate(-3, -8)">
    <rect x="0" y="-4" width="12" height="9" fill="#1E1E2E" rx="1.5"/>
    <rect x="0" y="-4" width="12" height="1.5" fill="#2D2D3D" rx="1.5"/>
    <circle cx="1" cy="-3.2" r="0.35" fill="#FF5F56"/>
    <circle cx="2" cy="-3.2" r="0.35" fill="#FFBD2E"/>
    <circle cx="3" cy="-3.2" r="0.35" fill="#27C93F"/>
    <rect class="code-line cl1" x="1" y="-1.5" width="4" height="0.6" fill="#4CAF50" rx="0.2"/>
    <rect class="code-line cl2" x="2" y="0.2" width="7" height="0.6" fill="#40C4FF" rx="0.2"/>
    <rect class="code-line cl3" x="1" y="1.9" width="3" height="0.6" fill="#FFC107" rx="0.2"/>
  </g>

  <!-- Main Body -->
  <g class="body-bounce">
    <g clip-path="url(#bodyClip)">
      <circle cx="-8" cy="2" r="22" fill="#ff7d10"/>
      <circle cx="17" cy="13" r="19" fill="#0a0310"/>
    </g>
    
    <!-- Cute happy eyes ^_^ -->
    <g class="eyes-happy" fill="none" stroke="#FFFFFF" stroke-width="0.6" stroke-linecap="round">
      <path d="M 3.5 6 Q 5 4 6.5 6"/>
      <path d="M 9.5 6 Q 11 4 12.5 6"/>
    </g>
    
    <!-- Happy working smile with tongue -->
    <path d="M 5.5 10 Q 8 13 10.5 10" stroke="#FFFFFF" stroke-width="0.6" fill="none" stroke-linecap="round"/>
    <!-- Little blush marks -->
    <ellipse cx="3" cy="9" rx="1.2" ry="0.6" fill="#FF9999" opacity="0.4"/>
    <ellipse cx="13" cy="9" rx="1.2" ry="0.6" fill="#FF9999" opacity="0.4"/>
  </g>

  <!-- Cute Keyboard -->
  <g id="keyboard" transform="translate(-3, 15)">
    <rect x="0" y="0" width="22" height="4" fill="#5D6D7E" rx="1.5"/>
    <g fill="#8899AA">
      <rect x="1" y="0.5" width="1.8" height="1" rx="0.3"/>
      <rect x="3.5" y="0.5" width="1.8" height="1" rx="0.3"/>
      <rect x="6" y="0.5" width="7" height="1" rx="0.3"/>
      <rect x="14" y="0.5" width="1.8" height="1" rx="0.3"/>
      <rect x="16.5" y="0.5" width="1.8" height="1" rx="0.3"/>
      <rect x="19" y="0.5" width="1.8" height="1" rx="0.3"/>
      <rect x="1" y="2" width="1.3" height="1" rx="0.3"/>
      <rect x="2.8" y="2" width="1.3" height="1" rx="0.3"/>
      <rect x="4.6" y="2" width="1.3" height="1" rx="0.3"/>
      <rect x="6.4" y="2" width="1.3" height="1" rx="0.3"/>
      <rect x="8.2" y="2" width="1.3" height="1" rx="0.3"/>
      <rect x="10" y="2" width="1.3" height="1" rx="0.3"/>
      <rect x="11.8" y="2" width="1.3" height="1" rx="0.3"/>
      <rect x="13.6" y="2" width="1.3" height="1" rx="0.3"/>
      <rect x="15.4" y="2" width="1.3" height="1" rx="0.3"/>
      <rect x="17.2" y="2" width="1.3" height="1" rx="0.3"/>
      <rect x="19" y="2" width="1.8" height="1" rx="0.3"/>
    </g>
    <g fill="#AABBCC">
      <rect class="key-flash kf1" x="4.6" y="2" width="1.3" height="1" rx="0.3"/>
      <rect class="key-flash kf2" x="10" y="2" width="1.3" height="1" rx="0.3"/>
      <rect class="key-flash kf3" x="6" y="0.5" width="7" height="1" rx="0.3"/>
    </g>
  </g>
</svg>
