<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .lean-left {
        transform-origin: 8px 20px;
        animation: lean-l 0.3s ease-out forwards;
      }

      .blink-left { animation: blink 0.5s ease-out; }

      @keyframes lean-l {
        0% { transform: rotate(0deg); }
        50% { transform: rotate(-8deg); }
        100% { transform: rotate(-3deg); }
      }

      @keyframes blink {
        0%, 100% { transform: scaleY(1); }
        50% { transform: scaleY(0.1); }
      }
    </style>
    <clipPath id="bodyClip">
      <circle cx="8" cy="8" r="14"/>
    </clipPath>
  </defs>

  <ellipse cx="8" cy="22" rx="10" ry="2" fill="#000000" opacity="0.3"/>

  <g class="lean-left">
    <g clip-path="url(#bodyClip)">
      <circle cx="-8" cy="2" r="22" fill="#ff7d10"/>
      <circle cx="17" cy="13" r="19" fill="#0a0310"/>
    </g>
    
    <g fill="#FFFFFF">
      <rect x="3" y="6" width="3" height="0.8" rx="0.4"/>
      <circle class="blink-left" cx="11" cy="6" r="0.7"/>
    </g>
    
    <path d="M 5.5 11 Q 8 13.5 10.5 11" stroke="#FFFFFF" stroke-width="0.6" fill="none" stroke-linecap="round"/>
  </g>
</svg>
