<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .wake-stretch { transform-origin: 8px 20px; animation: wake 1.5s ease-out forwards; }
      .eyes-open { animation: eyes-wake 1.5s ease-out forwards; }
      @keyframes wake {
        0% { transform: scale(1.3, 0.5) translateY(5px); }
        40% { transform: scale(0.9, 1.2) translateY(-3px); }
        70% { transform: scale(1.05, 0.95) translateY(0); }
        100% { transform: scale(1, 1) translateY(0); }
      }
      @keyframes eyes-wake { 0%, 30% { transform: scaleY(0.1); } 60% { transform: scaleY(0.5); } 100% { transform: scaleY(1); } }
    </style>
    <clipPath id="bodyClip"><circle cx="8" cy="8" r="14"/></clipPath>
  </defs>
  <ellipse cx="8" cy="22" rx="10" ry="2" fill="#000000" opacity="0.3"/>
  <g class="wake-stretch">
    <g clip-path="url(#bodyClip)">
      <circle cx="-8" cy="2" r="22" fill="#ff7d10"/>
      <circle cx="17" cy="13" r="19" fill="#0a0310"/>
    </g>
    <g class="eyes-open" fill="#FFFFFF"><circle cx="5" cy="6" r="0.7"/><circle cx="11" cy="6" r="0.7"/></g>
    <ellipse cx="8" cy="11" rx="1.3" ry="1" fill="#3D3D3D"/>
  </g>
</svg>
