<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .body-sway {
        transform-origin: 8px 0px;
        animation: sway 1.2s infinite alternate ease-in-out;
      }

      .shadow-lift {
        transform-origin: 8px 22px;
        animation: shadow-pulse 1.2s infinite alternate ease-in-out;
      }

      @keyframes sway {
        0% { transform: rotate(-5deg) translate(-1px, 0); }
        100% { transform: rotate(5deg) translate(1px, 0); }
      }

      @keyframes shadow-pulse {
        0% { transform: scale(0.5); opacity: 0.15; }
        100% { transform: scale(0.6); opacity: 0.2; }
      }
    </style>
    <clipPath id="bodyClip">
      <circle cx="8" cy="8" r="14"/>
    </clipPath>
  </defs>

  <ellipse class="shadow-lift" cx="8" cy="22" rx="6" ry="1.5" fill="#000000"/>

  <g class="body-sway">
    <g clip-path="url(#bodyClip)">
      <circle cx="-8" cy="2" r="22" fill="#ff7d10"/>
      <circle cx="17" cy="13" r="19" fill="#0a0310"/>
    </g>
    
    <g fill="none" stroke="#FFFFFF" stroke-width="0.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3,5 5.5,6.5 3,8"/>
      <polyline points="13,5 10.5,6.5 13,8"/>
    </g>
    
    <ellipse cx="8" cy="12" rx="2" ry="1.8" fill="#3D3D3D"/>
  </g>
</svg>
