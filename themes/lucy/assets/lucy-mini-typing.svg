<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .type-bounce { transform-origin: 8px 15px; animation: type-bob 0.35s infinite ease-in-out; }
      .eyes-type { animation: type-focus 2s infinite ease-in-out; }
      @keyframes type-bob { 0%, 100% { transform: translateY(0) rotate(-12deg); } 50% { transform: translateY(0.5px) rotate(-12deg); } }
      @keyframes type-focus { 0%, 100% { transform: translate(0, 0.3px) scaleY(0.7); } 50% { transform: translate(0, 0.3px) scaleY(0.1); } 55% { transform: translate(0, 0.3px) scaleY(0.7); } }
    </style>
    <clipPath id="bodyClip"><circle cx="8" cy="8" r="14"/></clipPath>
  </defs>
  <g class="type-bounce">
    <g clip-path="url(#bodyClip)">
      <circle cx="-8" cy="2" r="22" fill="#ff7d10"/>
      <circle cx="17" cy="13" r="19" fill="#0a0310"/>
    </g>
    <g class="eyes-type" fill="#FFFFFF"><circle cx="5" cy="6" r="0.7"/><circle cx="11" cy="6" r="0.7"/></g>
    <path d="M 6 11 L 10 11" stroke="#FFFFFF" stroke-width="0.5" stroke-linecap="round"/>
  </g>
</svg>
