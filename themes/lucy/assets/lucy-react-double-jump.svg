<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .jump-anim {
        transform-origin: 8px 20px;
        animation: jump 0.8s ease-out forwards;
      }

      .shadow-jump { animation: shadow-shrink 0.8s ease-out forwards; }

      @keyframes jump {
        0% { transform: translateY(0) scale(1, 1); }
        20% { transform: translateY(0) scale(1.1, 0.8); }
        50% { transform: translateY(-15px) scale(0.95, 1.1); }
        70% { transform: translateY(-12px) scale(1, 1); }
        90% { transform: translateY(0) scale(1.05, 0.9); }
        100% { transform: translateY(0) scale(1, 1); }
      }

      @keyframes shadow-shrink {
        0% { transform: scale(1); opacity: 0.3; }
        50% { transform: scale(0.4); opacity: 0.1; }
        100% { transform: scale(1); opacity: 0.3; }
      }
    </style>
    <clipPath id="bodyClip">
      <circle cx="8" cy="8" r="14"/>
    </clipPath>
  </defs>

  <ellipse class="shadow-jump" cx="8" cy="22" rx="10" ry="2" fill="#000000"/>

  <g class="jump-anim">
    <g clip-path="url(#bodyClip)">
      <circle cx="-8" cy="2" r="22" fill="#ff7d10"/>
      <circle cx="17" cy="13" r="19" fill="#0a0310"/>
    </g>
    
    <g fill="none" stroke="#FFFFFF" stroke-width="0.7" stroke-linecap="round">
      <path d="M 3.5 5.5 Q 5 3.5 6.5 5.5"/>
      <path d="M 9.5 5.5 Q 11 3.5 12.5 5.5"/>
    </g>
    
    <path d="M 4 10.5 Q 8 15 12 10.5" stroke="#FFFFFF" stroke-width="0.7" fill="none" stroke-linecap="round"/>
  </g>

  <g fill="#FFD700">
    <circle cx="-10" cy="-5" r="1"/>
    <circle cx="26" cy="-3" r="1.2"/>
    <circle cx="8" cy="-15" r="1"/>
    <circle cx="-8" cy="10" r="0.8"/>
    <circle cx="24" cy="8" r="1.2"/>
  </g>
</svg>
