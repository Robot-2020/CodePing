<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .body-sway { transform-origin: 8px 8px; animation: conduct-sway 1.5s infinite ease-in-out; }
      .eyes-blink { transform-origin: 8px 6px; animation: eye-blink 4s infinite ease-in-out; }
      #eyes-js { transition: transform 0.2s ease-out; }
      .note { opacity: 0; animation: note-float 3s infinite ease-out; }
      .n1 { animation-delay: 0s; } .n2 { animation-delay: 1.5s; }
      @keyframes conduct-sway { 0%, 100% { transform: rotate(-15deg); } 50% { transform: rotate(-9deg); } }
      @keyframes eye-blink { 0%, 10%, 100% { transform: scaleY(1); } 5% { transform: scaleY(0.1); } }
      @keyframes note-float { 0% { transform: translate(0, 0); opacity: 0; } 20% { opacity: 0.6; } 100% { transform: translate(3px, -10px); opacity: 0; } }
    </style>
    <clipPath id="bodyClip"><circle cx="8" cy="8" r="14"/></clipPath>
  </defs>
  <g fill="#4ECDC4" opacity="0.5">
    <text class="note n1" x="20" y="-3" font-size="5">♪</text>
    <text class="note n2" x="22" y="2" font-size="4">♫</text>
  </g>
  <g class="body-sway">
    <g clip-path="url(#bodyClip)">
      <circle cx="-8" cy="2" r="22" fill="#E65100"/>
      <circle cx="16" cy="12" r="20" fill="#2D2D2D"/>
    </g>
    <g id="eyes-js" fill="none" stroke="#FFFFFF" stroke-width="1.1" stroke-linecap="round">
      <g class="eyes-blink">
        <path d="M 3.5 6 Q 5 4.5 6.5 6"/>
        <path d="M 9.5 6 Q 11 4.5 12.5 6"/>
      </g>
    </g>
    <path d="M 5.5 10.5 Q 8 13 10.5 10.5" stroke="#FFFFFF" stroke-width="0.9" fill="none" stroke-linecap="round"/>
  </g>
</svg>
