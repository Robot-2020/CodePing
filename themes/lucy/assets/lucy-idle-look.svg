<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .breathe-anim { transform-origin: 8px 8px; animation: breathe 3.2s infinite ease-in-out; }
      .eyes-look { animation: look-around 6s infinite ease-in-out; }
      @keyframes breathe { 0%, 100% { transform: scale(1, 1); } 50% { transform: scale(1.02, 0.98); } }
      @keyframes look-around {
        0%, 20% { transform: translate(0, 0); }
        25%, 45% { transform: translate(-1.5px, 0); }
        50%, 70% { transform: translate(1.5px, 0); }
        75%, 95% { transform: translate(0, -0.5px); }
        100% { transform: translate(0, 0); }
      }
    </style>
    <clipPath id="bodyClip"><circle cx="8" cy="8" r="14"/></clipPath>
  </defs>
  <ellipse cx="8" cy="22" rx="10" ry="2" fill="#000000" opacity="0.3"/>
  <g class="breathe-anim">
    <g clip-path="url(#bodyClip)">
      <circle cx="-8" cy="2" r="22" fill="#ff7d10"/>
      <circle cx="17" cy="13" r="19" fill="#0a0310"/>
    </g>
    <g class="eyes-look" fill="#FFFFFF"><circle cx="5" cy="6" r="0.7"/><circle cx="11" cy="6" r="0.7"/></g>
    <path d="M 6.5 11 Q 8 12.5 9.5 11" stroke="#FFFFFF" stroke-width="0.6" fill="none" stroke-linecap="round"/>
  </g>
</svg>
