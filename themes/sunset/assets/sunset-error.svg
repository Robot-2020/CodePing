<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .body-exhausted { transform-origin: 8px 15px; animation: heavy-breathe 2.5s infinite ease-in-out; }
      .smoke { opacity: 0; animation: puff-smoke 3s infinite ease-out; }
      .sm1 { animation-delay: 0s; } .sm2 { animation-delay: 1s; } .sm3 { animation-delay: 2s; }
      .error-warning { animation: error-flash 0.8s infinite ease-in-out; }
      .sweat { animation: sweat-drop 2s infinite ease-in; }
      .crack { animation: crack-spread 0.5s infinite ease-in-out; }
      @keyframes heavy-breathe { 0%, 100% { transform: scale(1, 1) translateY(0); } 50% { transform: scale(1.05, 0.92) translateY(1px); } }
      @keyframes puff-smoke { 0% { transform: translate(8px, 0px) scale(0.5); opacity: 0; } 20% { opacity: 0.6; } 100% { transform: translate(8px, -20px) scale(2); opacity: 0; } }
      @keyframes error-flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }
      @keyframes sweat-drop { 0% { transform: translateY(0); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(10px); opacity: 0; } }
      @keyframes crack-spread { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
    <mask id="faceMask" maskUnits="userSpaceOnUse" x="-6" y="-6" width="28" height="28">
      <circle cx="8" cy="8" r="14" fill="#FFFFFF"/>
    </mask>
    <g id="smoke-puff">
      <circle cx="0" cy="0" r="2" fill="#B0BEC5"/>
      <circle cx="2" cy="-1" r="2" fill="#CFD8DC"/>
    </g>
  </defs>
  <ellipse cx="8" cy="22" rx="12" ry="2" fill="#000000" opacity="0.3"/>
  <!-- Smoke -->
  <g>
    <use href="#smoke-puff" class="smoke sm1"/>
    <use href="#smoke-puff" class="smoke sm2" transform="translate(-2, 0)"/>
    <use href="#smoke-puff" class="smoke sm3" transform="translate(2, 0)"/>
  </g>
  <!-- Cracks -->
  <g class="crack" stroke="#ff005b" stroke-width="0.5" fill="none" opacity="0.6">
    <path d="M -5 -5 L -2 -2 L -6 2"/>
    <path d="M 22 -3 L 19 0 L 23 4"/>
  </g>
  <g class="body-exhausted">
    <g mask="url(#faceMask)">
      <rect x="-6" y="-6" width="28" height="28" fill="#ff005b"/>
      <rect x="-6" y="-6" width="28" height="28" transform="translate(7 -4) rotate(219 8 8)" fill="#ffb238" rx="5"/>
    </g>
    <!-- X eyes -->
    <g transform="rotate(-9 8 8)" stroke="#000000" stroke-width="0.8" stroke-linecap="round">
      <line x1="3" y1="4" x2="5.5" y2="7"/>
      <line x1="5.5" y1="4" x2="3" y2="7"/>
      <line x1="11.5" y1="4" x2="14" y2="7"/>
      <line x1="14" y1="4" x2="11.5" y2="7"/>
    </g>
    <!-- Wavy distressed mouth -->
    <g transform="rotate(-9 8 8)">
      <path d="M 5 11 Q 6.5 9.5 8 11 Q 9.5 12.5 11 11" stroke="#000000" stroke-width="0.6" fill="none" stroke-linecap="round"/>
    </g>
    <!-- Sweat -->
    <path class="sweat" d="M 18 2 Q 19 4 18 6 Q 17 4 18 2 Z" fill="#64B5F6"/>
  </g>
  <!-- ERROR text -->
  <g class="error-warning">
    <text x="8" y="-8" text-anchor="middle" font-family="Arial" font-size="4" font-weight="700" fill="#FF3B30">ERROR</text>
  </g>
</svg>