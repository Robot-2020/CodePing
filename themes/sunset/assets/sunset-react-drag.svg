<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .drag { animation: drag-wobble 0.2s infinite ease-in-out; transform-origin: 8px 8px; }
      .motion-line { animation: motion 0.3s infinite ease-out; }
      .ml1 { animation-delay: 0s; } .ml2 { animation-delay: 0.1s; } .ml3 { animation-delay: 0.2s; }
      @keyframes drag-wobble { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
      @keyframes motion { 0% { opacity: 0.8; transform: translateX(0); } 100% { opacity: 0; transform: translateX(-10px); } }
    </style>
    <mask id="faceMask" maskUnits="userSpaceOnUse" x="-6" y="-6" width="28" height="28">
      <circle cx="8" cy="8" r="14" fill="#FFFFFF"/>
    </mask>
  </defs>
  <ellipse cx="8" cy="22" rx="10" ry="2" fill="#000000" opacity="0.3"/>
  <!-- Motion lines -->
  <g stroke="#ffb238" stroke-width="0.8" stroke-linecap="round">
    <line class="motion-line ml1" x1="-8" y1="5" x2="-3" y2="5"/>
    <line class="motion-line ml2" x1="-10" y1="8" x2="-4" y2="8"/>
    <line class="motion-line ml3" x1="-8" y1="11" x2="-3" y2="11"/>
  </g>
  <g class="drag">
    <g mask="url(#faceMask)">
      <rect x="-6" y="-6" width="28" height="28" fill="#ff005b"/>
      <rect x="-6" y="-6" width="28" height="28" transform="translate(7 -4) rotate(219 8 8)" fill="#ffb238" rx="5"/>
    </g>
    <g transform="rotate(-9 8 8)">
      <ellipse cx="8" cy="11" rx="1.5" ry="2" fill="#000000"/>
      <rect x="3" y="4" width="1.5" height="2.5" rx="0.75" fill="#000000"/>
      <rect x="12" y="4" width="1.5" height="2.5" rx="0.75" fill="#000000"/>
    </g>
  </g>
</svg>