<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .think-pulse { transform-origin: 8px 8px; animation: think 2s infinite ease-in-out; }
      .thought-bubble { opacity: 0; animation: bubble-float 3s infinite ease-out; }
      .tb1 { animation-delay: 0s; } .tb2 { animation-delay: 1s; } .tb3 { animation-delay: 2s; }
      .eyes-think { animation: look-up 4s infinite ease-in-out; }
      .question { animation: question-bounce 1.5s infinite ease-in-out; }
      @keyframes think { 0%, 100% { transform: scale(1, 1); } 50% { transform: scale(1.02, 0.98); } }
      @keyframes bubble-float { 0% { transform: translate(18px, 2px) scale(0.3); opacity: 0; } 20% { opacity: 0.8; } 100% { transform: translate(22px, -12px) scale(1); opacity: 0; } }
      @keyframes look-up { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-0.5px); } }
      @keyframes question-bounce { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-2px) rotate(5deg); } }
    </style>
    <mask id="faceMask" maskUnits="userSpaceOnUse" x="-6" y="-6" width="28" height="28">
      <circle cx="8" cy="8" r="14" fill="#FFFFFF"/>
    </mask>
  </defs>
  <ellipse cx="8" cy="22" rx="10" ry="2" fill="#000000" opacity="0.3"/>
  <!-- Thought bubbles -->
  <g fill="#ffb238" opacity="0.6">
    <circle class="thought-bubble tb1" r="1.5"/>
    <circle class="thought-bubble tb2" r="2.5"/>
    <circle class="thought-bubble tb3" r="1"/>
  </g>
  <g class="think-pulse">
    <g mask="url(#faceMask)">
      <rect x="-6" y="-6" width="28" height="28" fill="#ff005b"/>
      <rect x="-6" y="-6" width="28" height="28" transform="translate(7 -4) rotate(219 8 8)" fill="#ffb238" rx="5"/>
    </g>
    <g class="eyes-think" transform="rotate(-9 8 8)">
      <rect x="3" y="4.5" width="1.2" height="1.6" rx="0.6" fill="#000000"/>
      <rect x="12" y="4.5" width="1.2" height="1.6" rx="0.6" fill="#000000"/>
    </g>
    <g transform="rotate(-9 8 8)">
      <ellipse cx="8" cy="11" rx="1" ry="0.5" fill="#000000" opacity="0.5"/>
    </g>
  </g>
  <!-- Big animated question mark -->
  <text class="question" x="22" y="-5" font-family="Arial" font-size="8" font-weight="bold" fill="#ffb238">?</text>
</svg>