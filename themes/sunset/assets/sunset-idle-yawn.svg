<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .yawn { animation: yawn 4s infinite ease-in-out; transform-origin: 8px 8px; }
      .mouth-yawn { animation: mouth-open 4s infinite ease-in-out; transform-origin: 8px 11px; }
      @keyframes yawn { 0%, 100% { transform: scale(1); } 40%, 60% { transform: scale(1.03, 0.97); } }
      @keyframes mouth-open { 0%, 20%, 80%, 100% { transform: scaleY(0.3); } 40%, 60% { transform: scaleY(1.5); } }
    </style>
    <mask id="faceMask" maskUnits="userSpaceOnUse" x="-6" y="-6" width="28" height="28">
      <circle cx="8" cy="8" r="14" fill="#FFFFFF"/>
    </mask>
  </defs>
  <ellipse cx="8" cy="22" rx="10" ry="2" fill="#000000" opacity="0.3"/>
  <g class="yawn">
    <g mask="url(#faceMask)">
      <rect x="-6" y="-6" width="28" height="28" fill="#ff005b"/>
      <rect x="-6" y="-6" width="28" height="28" transform="translate(7 -4) rotate(219 8 8)" fill="#ffb238" rx="5"/>
    </g>
    <g transform="rotate(-9 8 8)">
      <path d="M3 6 L5 6" stroke="#000000" stroke-width="1" stroke-linecap="round"/>
      <path d="M12 6 L14 6" stroke="#000000" stroke-width="1" stroke-linecap="round"/>
      <ellipse class="mouth-yawn" cx="8" cy="11" rx="1.2" ry="1.5" fill="#000000"/>
    </g>
  </g>
</svg>