<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .breathe { animation: breathe 3.2s infinite ease-in-out; transform-origin: 8px 8px; }
      .eyes-look { animation: look-around 6s infinite ease-in-out; }
      .shadow-breathe { animation: shadow-pulse 3.2s infinite ease-in-out; transform-origin: 8px 22px; }
      .sparkle { opacity: 0; animation: twinkle 4s infinite ease-in-out; }
      .sp1 { animation-delay: 0s; } .sp2 { animation-delay: 1.3s; } .sp3 { animation-delay: 2.6s; }
      @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02, 0.98); } }
      @keyframes look-around { 0%, 20% { transform: translate(0, 0); } 25%, 45% { transform: translate(-0.5px, 0); } 50%, 70% { transform: translate(0.5px, 0); } 75%, 95% { transform: translate(0, -0.3px); } 100% { transform: translate(0, 0); } }
      @keyframes shadow-pulse { 0%, 100% { transform: scaleX(1); opacity: 0.3; } 50% { transform: scaleX(1.05); opacity: 0.35; } }
      @keyframes twinkle { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 0.6; transform: scale(1); } }
    </style>
    <mask id="faceMask" maskUnits="userSpaceOnUse" x="-6" y="-6" width="28" height="28">
      <circle cx="8" cy="8" r="14" fill="#FFFFFF"/>
    </mask>
  </defs>
  <ellipse class="shadow-breathe" cx="8" cy="22" rx="10" ry="2" fill="#000000"/>
  <!-- Ambient sparkles -->
  <g fill="#ffb238">
    <circle class="sparkle sp1" cx="-5" cy="-3" r="0.8"/>
    <circle class="sparkle sp2" cx="22" cy="2" r="0.6"/>
    <circle class="sparkle sp3" cx="-3" cy="12" r="0.5"/>
  </g>
  <g class="breathe">
    <g mask="url(#faceMask)">
      <rect x="-6" y="-6" width="28" height="28" fill="#ff005b"/>
      <rect x="-6" y="-6" width="28" height="28" transform="translate(7 -4) rotate(219 8 8)" fill="#ffb238" rx="5"/>
    </g>
    <g class="eyes-look" transform="rotate(-9 8 8)">
      <path d="M5 11c1.5 0.8 3 0.8 4.5 0" stroke="#000000" fill="none" stroke-linecap="round"/>
      <rect x="3" y="5" width="1.2" height="1.6" rx="0.6" fill="#000000"/>
      <rect x="12" y="5" width="1.2" height="1.6" rx="0.6" fill="#000000"/>
    </g>
  </g>
</svg>