<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .annoyed { animation: annoyed 0.15s infinite ease-in-out; transform-origin: 8px 8px; }
      .sweat { animation: sweat-drop 1.5s infinite ease-in; }
      .sw1 { animation-delay: 0s; } .sw2 { animation-delay: 0.5s; }
      .anger-mark { animation: anger-pulse 0.5s infinite ease-in-out; }
      .am1 { animation-delay: 0s; } .am2 { animation-delay: 0.25s; }
      .vein { animation: vein-throb 0.3s infinite ease-in-out; }
      @keyframes annoyed { 0%, 100% { transform: translateX(-0.5px); } 50% { transform: translateX(0.5px); } }
      @keyframes sweat-drop { 0% { transform: translateY(0); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(8px); opacity: 0; } }
      @keyframes anger-pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; } }
      @keyframes vein-throb { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
    </style>
    <mask id="faceMask" maskUnits="userSpaceOnUse" x="-6" y="-6" width="28" height="28">
      <circle cx="8" cy="8" r="14" fill="#FFFFFF"/>
    </mask>
  </defs>
  <ellipse cx="8" cy="22" rx="10" ry="2" fill="#000000" opacity="0.3"/>
  <!-- Anger marks -->
  <g fill="#ff005b">
    <path class="anger-mark am1" d="M -6 -3 L -4 -1 L -6 1 L -4 -1 L -2 -3 L -4 -1 L -2 1" stroke="#ff005b" stroke-width="0.8" fill="none"/>
    <path class="anger-mark am2" d="M 20 -5 L 22 -3 L 20 -1 L 22 -3 L 24 -5 L 22 -3 L 24 -1" stroke="#ff005b" stroke-width="0.8" fill="none"/>
  </g>
  <!-- Vein -->
  <g class="vein" transform="translate(18, -2)">
    <path d="M 0 0 L 2 -2 L 0 -4 M 2 -2 L 4 -2" stroke="#ff005b" stroke-width="0.8" fill="none"/>
  </g>
  <g class="annoyed">
    <g mask="url(#faceMask)">
      <rect x="-6" y="-6" width="28" height="28" fill="#ff005b"/>
      <rect x="-6" y="-6" width="28" height="28" transform="translate(7 -4) rotate(219 8 8)" fill="#ffb238" rx="5"/>
    </g>
    <g transform="rotate(-9 8 8)">
      <path d="M5 11 L11 11" stroke="#000000" stroke-width="0.8" stroke-linecap="round"/>
      <rect x="3" y="5.5" width="2" height="0.8" rx="0.4" fill="#000000"/>
      <rect x="12" y="5.5" width="2" height="0.8" rx="0.4" fill="#000000"/>
    </g>
  </g>
  <!-- Sweat drops -->
  <path class="sweat sw1" d="M -4 4 Q -3 6 -4 8 Q -5 6 -4 4 Z" fill="#64B5F6"/>
  <path class="sweat sw2" d="M 20 6 Q 21 8 20 10 Q 19 8 20 6 Z" fill="#64B5F6"/>
</svg>