<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 55 55" width="500" height="500">
  <defs>
    <style>
      .sweep { animation: sweep 1s infinite ease-in-out; transform-origin: 8px 8px; }
      .broom { transform-origin: 20px 15px; animation: broom-sweep 1s infinite ease-in-out; }
      .dust { opacity: 0; animation: dust-fly 1s infinite ease-out; }
      .d1 { animation-delay: 0s; } .d2 { animation-delay: 0.3s; } .d3 { animation-delay: 0.6s; }
      .sparkle-clean { opacity: 0; animation: sparkle-pop 2s infinite ease-out; }
      .sc1 { animation-delay: 0.2s; } .sc2 { animation-delay: 0.8s; } .sc3 { animation-delay: 1.4s; }
      @keyframes sweep { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
      @keyframes broom-sweep { 0%, 100% { transform: rotate(-20deg); } 50% { transform: rotate(20deg); } }
      @keyframes dust-fly { 0% { transform: translate(0, 0); opacity: 0; } 20% { opacity: 0.6; } 100% { transform: translate(-15px, -8px); opacity: 0; } }
      @keyframes sparkle-pop { 0% { transform: scale(0); opacity: 0; } 20% { transform: scale(1.2); opacity: 1; } 40% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(0); opacity: 0; } }
    </style>
    <mask id="faceMask" maskUnits="userSpaceOnUse" x="-6" y="-6" width="28" height="28">
      <circle cx="8" cy="8" r="14" fill="#FFFFFF"/>
    </mask>
  </defs>
  <ellipse cx="8" cy="22" rx="10" ry="2" fill="#000000" opacity="0.3"/>
  <!-- Dust particles -->
  <g fill="#A0A0A0">
    <circle class="dust d1" cx="-5" cy="18" r="1"/>
    <circle class="dust d2" cx="-8" cy="16" r="1.2"/>
    <circle class="dust d3" cx="-3" cy="17" r="1.5"/>
  </g>
  <!-- Clean sparkles -->
  <g fill="#FFD700">
    <circle class="sparkle-clean sc1" cx="-10" cy="10" r="0.8"/>
    <circle class="sparkle-clean sc2" cx="-8" cy="5" r="0.6"/>
    <circle class="sparkle-clean sc3" cx="-12" cy="15" r="0.5"/>
  </g>
  <g class="sweep">
    <g mask="url(#faceMask)">
      <rect x="-6" y="-6" width="28" height="28" fill="#ff005b"/>
      <rect x="-6" y="-6" width="28" height="28" transform="translate(7 -4) rotate(219 8 8)" fill="#ffb238" rx="5"/>
    </g>
    <g transform="rotate(-9 8 8)">
      <rect x="3" y="5" width="1.2" height="1.6" rx="0.6" fill="#000000"/>
      <rect x="12" y="5" width="1.2" height="1.6" rx="0.6" fill="#000000"/>
      <path d="M5 11c1.5 0.8 3 0.8 4.5 0" stroke="#000000" fill="none" stroke-linecap="round"/>
    </g>
  </g>
  <!-- Broom -->
  <g class="broom">
    <rect x="18" y="-5" width="1.5" height="20" fill="#8B4513"/>
    <rect x="15" y="14" width="8" height="4" fill="#DAA520" rx="1"/>
    <g fill="#CD853F">
      <rect x="15" y="17" width="1" height="3"/>
      <rect x="17" y="17" width="1" height="3"/>
      <rect x="19" y="17" width="1" height="3"/>
      <rect x="21" y="17" width="1" height="3"/>
    </g>
  </g>
</svg>