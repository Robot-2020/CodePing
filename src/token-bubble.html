<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --card-bg: #ffffff;
  --card-border: rgba(0, 0, 0, 0.08);
  --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
  --text-primary: #18181b;
  --text-secondary: #71717a;
  --accent: #3b82f6;
  --input-color: #22c55e;
  --output-color: #f59e0b;
  --cost-color: #8b5cf6;
  --cost-color-dim: rgba(139, 92, 246, 0.4);
}

@media (prefers-color-scheme: dark) {
  :root {
    --card-bg: #18181b;
    --card-border: rgba(255, 255, 255, 0.1);
    --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
    --text-primary: #f4f4f5;
    --text-secondary: #a1a1aa;
    --input-color: #4ade80;
    --output-color: #fbbf24;
    --cost-color: #a78bfa;
    --cost-color-dim: rgba(167, 139, 250, 0.4);
  }
}

html, body {
  width: 100%; height: 100%;
  background: transparent;
  overflow: hidden;
  user-select: none;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

body { padding: 4px; }

.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 12px 16px;
  box-shadow: var(--card-shadow);
  color: var(--text-primary);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.25s ease, transform 0.25s ease;
  font-size: 12px;
  min-width: 160px;
}

.card.visible {
  opacity: 0.8;
  transform: translateY(0);
  transition: opacity 0.25s ease, transform 0.25s ease;
}

.card.visible:hover {
  opacity: 1;
}

.card.hiding {
  opacity: 0;
  transform: translateY(10px);
}

.header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
  font-weight: 600;
  font-size: 11px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.header-icon {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

.stats {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}

.stat-label {
  color: var(--text-secondary);
  font-size: 11px;
  font-weight: 500;
}

.stat-value {
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  font-size: 13px;
}

.stat-value.input { color: var(--input-color); }
.stat-value.output { color: var(--output-color); }
.stat-value.cost {
  color: var(--cost-color-dim);
  transition: color 0.2s ease;
  font-size: 14px;
}
.stat-row:hover .stat-value.cost {
  color: var(--cost-color);
}
.stat-value.total { color: var(--text-primary); }

.divider {
  height: 1px;
  background: var(--card-border);
  margin: 4px 0;
}

.total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 2px;
}

.cost-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  margin-top: 4px;
}

.context-row {
  grid-column: 1 / -1;
  margin-top: 6px;
}

.context-label {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.context-bar {
  height: 6px;
  background: var(--card-border);
  border-radius: 3px;
  overflow: hidden;
}

.context-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.3s ease, background 0.3s ease;
}

.context-fill.warning { background: var(--output-color); }
.context-fill.critical { background: #ef4444; }

.hidden { display: none; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="header">
    <svg class="header-icon" viewBox="0 0 80 80" fill="none" role="img" xmlns="http://www.w3.org/2000/svg"><mask id="_r_sm_" maskUnits="userSpaceOnUse" x="0" y="0" width="80" height="80"><rect width="80" height="80" rx="160" fill="#FFFFFF"></rect></mask><g mask="url(#_r_sm_)"><path fill="url(#gradient_paint0_linear_SarahWinnemucca)" d="M0 0h80v40H0z"></path><path fill="url(#gradient_paint1_linear_SarahWinnemucca)" d="M0 40h80v40H0z"></path></g><defs><linearGradient id="gradient_paint0_linear_SarahWinnemucca" x1="40" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop stop-color="#49007e"></stop><stop offset="1" stop-color="#ff005b"></stop></linearGradient><linearGradient id="gradient_paint1_linear_SarahWinnemucca" x1="40" y1="40" x2="40" y2="80" gradientUnits="userSpaceOnUse"><stop stop-color="#ff7d10"></stop><stop offset="1" stop-color="#ffb238"></stop></linearGradient></defs></svg>
    <span id="headerText">Token Usage</span>
  </div>
  <div class="stats">
    <div class="stat-row">
      <span class="stat-label">Input</span>
      <span class="stat-value input" id="inputTokens">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Output</span>
      <span class="stat-value output" id="outputTokens">0</span>
    </div>
    <div class="divider"></div>
    <div class="total-row">
      <span class="stat-label">Total</span>
      <span class="stat-value total" id="totalTokens">0</span>
    </div>
    <div class="cost-row" id="costRow">
      <span class="stat-label">Cost</span>
      <span class="stat-value cost">$<span id="costValue">0.00</span></span>
    </div>
    <div class="context-row hidden" id="contextRow">
      <div class="context-label">
        <span>Context</span>
        <span id="contextPercent">0%</span>
      </div>
      <div class="context-bar">
        <div class="context-fill" id="contextFill" style="width: 0%"></div>
      </div>
    </div>
  </div>
</div>

<script>
const card = document.getElementById("card");
const inputTokens = document.getElementById("inputTokens");
const outputTokens = document.getElementById("outputTokens");
const totalTokens = document.getElementById("totalTokens");
const costRow = document.getElementById("costRow");
const costValue = document.getElementById("costValue");
const headerText = document.getElementById("headerText");
const contextRow = document.getElementById("contextRow");
const contextPercent = document.getElementById("contextPercent");
const contextFill = document.getElementById("contextFill");

function formatNumber(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1) + "M";
  if (num >= 1000) return (num / 1000).toFixed(1) + "K";
  return num.toString();
}

function updateStats(data) {
  if (!data) return;

  inputTokens.textContent = formatNumber(data.input_tokens || 0);
  outputTokens.textContent = formatNumber(data.output_tokens || 0);
  totalTokens.textContent = formatNumber(data.total_tokens || 0);

  // Always show cost row, display in USD (2 decimal places)
  if (data.cost_usd && data.cost_usd > 0) {
    costValue.textContent = data.cost_usd.toFixed(2);
  } else {
    costValue.textContent = "0.00";
  }
  costRow.classList.remove("hidden");

  // Context usage percentage (from native Claude Code data)
  if (typeof data.used_percentage === "number" && data.used_percentage > 0) {
    const pct = Math.min(100, Math.round(data.used_percentage));
    contextPercent.textContent = pct + "%";
    contextFill.style.width = pct + "%";
    contextFill.classList.remove("warning", "critical");
    if (pct >= 85) contextFill.classList.add("critical");
    else if (pct >= 70) contextFill.classList.add("warning");
    contextRow.classList.remove("hidden");
  } else {
    contextRow.classList.add("hidden");
  }

  // Report height for positioning
  requestAnimationFrame(() => {
    const height = document.body.scrollHeight;
    if (window.tokenBubbleAPI?.reportHeight) {
      window.tokenBubbleAPI.reportHeight(height);
    }
  });
}

function show() {
  card.classList.remove("hiding");
  card.classList.add("visible");
}

function hide() {
  card.classList.remove("visible");
  card.classList.add("hiding");
}

// Listen for IPC messages
if (window.tokenBubbleAPI) {
  window.tokenBubbleAPI.onTokenUpdate((data) => {
    updateStats(data);
    show();
  });

  window.tokenBubbleAPI.onHide(() => {
    hide();
  });

  window.tokenBubbleAPI.onLangChange((texts) => {
    if (texts.header) headerText.textContent = texts.header;
  });
}

// Initial state
card.classList.add("visible");
</script>
</body>
</html>
