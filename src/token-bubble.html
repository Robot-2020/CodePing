<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --card-bg: #ffffff;
  --card-border: rgba(0, 0, 0, 0.08);
  --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
  --text-primary: #18181b;
  --text-secondary: #71717a;
  --accent: #3b82f6;
  --input-color: #22c55e;
  --output-color: #f59e0b;
  --cost-color: #8b5cf6;
  --cost-color-dim: rgba(139, 92, 246, 0.4);
}

@media (prefers-color-scheme: dark) {
  :root {
    --card-bg: #18181b;
    --card-border: rgba(255, 255, 255, 0.1);
    --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
    --text-primary: #f4f4f5;
    --text-secondary: #a1a1aa;
    --input-color: #4ade80;
    --output-color: #fbbf24;
    --cost-color: #a78bfa;
    --cost-color-dim: rgba(167, 139, 250, 0.4);
  }
}

html, body {
  width: 100%; height: 100%;
  background: transparent;
  overflow: hidden;
  user-select: none;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

body { padding: 4px; }

.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 12px 16px;
  box-shadow: var(--card-shadow);
  color: var(--text-primary);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.25s ease, transform 0.25s ease;
  font-size: 12px;
  min-width: 160px;
}

.card.visible {
  opacity: 0.8;
  transform: translateY(0);
  transition: opacity 0.25s ease, transform 0.25s ease;
}

.card.visible:hover {
  opacity: 1;
}

.card.hiding {
  opacity: 0;
  transform: translateY(10px);
}

.header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
  font-weight: 600;
  font-size: 11px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.header-icon {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

.stats {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}

.stat-label {
  color: var(--text-secondary);
  font-size: 11px;
  font-weight: 500;
}

.stat-value {
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  font-size: 13px;
}

.stat-value.input { color: var(--input-color); }
.stat-value.output { color: var(--output-color); }
.stat-value.cost {
  color: var(--cost-color-dim);
  transition: color 0.2s ease;
  font-size: 14px;
}
.stat-row:hover .stat-value.cost {
  color: var(--cost-color);
}
.stat-value.total { color: var(--text-primary); }

.divider {
  height: 1px;
  background: var(--card-border);
  margin: 4px 0;
}

.total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 2px;
}

.cost-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  margin-top: 4px;
}

.context-row {
  grid-column: 1 / -1;
  margin-top: 6px;
}

.context-label {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.context-bar {
  height: 6px;
  background: var(--card-border);
  border-radius: 3px;
  overflow: hidden;
}

.context-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.3s ease, background 0.3s ease;
}

.context-fill.warning { background: var(--output-color); }
.context-fill.critical { background: #ef4444; }

.agent-costs {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px 12px;
  margin-top: 8px;
  padding-top: 4px;
}

.agent-cost-item {
  display: contents;
}

.agent-cost-label {
  color: var(--text-secondary);
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.agent-cost-value {
  color: var(--cost-color-dim);
  font-weight: 600;
  font-size: 13px;
  text-align: right;
  font-variant-numeric: tabular-nums;
  transition: color 0.2s ease;
}

.agent-costs:hover .agent-cost-value {
  color: var(--cost-color);
}

/* Quota progress bar styles */
.quota-progress-row {
  margin-top: 8px;
}

.quota-progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.quota-username {
  color: var(--text-primary);
  font-size: 12px;
  font-weight: 600;
}

.quota-percent {
  color: var(--text-secondary);
  font-size: 11px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}

.quota-progress-bar {
  height: 8px;
  background: var(--card-border);
  border-radius: 4px;
  overflow: hidden;
}

.quota-progress-fill {
  height: 100%;
  background: var(--input-color);
  border-radius: 4px;
  transition: width 0.5s ease, background 0.3s ease;
}

.quota-progress-fill.warning {
  background: var(--output-color);
}

.quota-progress-fill.critical {
  background: #ef4444;
}

.hidden { display: none; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="header">
    <svg class="header-icon" viewBox="0 0 80 80" fill="none" role="img" xmlns="http://www.w3.org/2000/svg"><mask id="_r_sm_" maskUnits="userSpaceOnUse" x="0" y="0" width="80" height="80"><rect width="80" height="80" rx="160" fill="#FFFFFF"></rect></mask><g mask="url(#_r_sm_)"><path fill="url(#gradient_paint0_linear_SarahWinnemucca)" d="M0 0h80v40H0z"></path><path fill="url(#gradient_paint1_linear_SarahWinnemucca)" d="M0 40h80v40H0z"></path></g><defs><linearGradient id="gradient_paint0_linear_SarahWinnemucca" x1="40" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop stop-color="#49007e"></stop><stop offset="1" stop-color="#ff005b"></stop></linearGradient><linearGradient id="gradient_paint1_linear_SarahWinnemucca" x1="40" y1="40" x2="40" y2="80" gradientUnits="userSpaceOnUse"><stop stop-color="#ff7d10"></stop><stop offset="1" stop-color="#ffb238"></stop></linearGradient></defs></svg>
    <span id="headerText">Token Usage</span>
  </div>
  <div class="stats">
    <!-- Comate 配额信息分组 -->
    <!-- User 进度条（显示百分比）-->
    <div class="quota-progress-row hidden" id="quotaProgressRow">
      <div class="quota-progress-header">
        <span class="quota-username" id="quotaUsername">—</span>
        <span class="quota-percent" id="quotaPercent">0%</span>
      </div>
      <div class="quota-progress-bar">
        <div class="quota-progress-fill" id="quotaProgressFill" style="width: 0%"></div>
      </div>
    </div>
    <!-- Total 已使用费用 -->
    <div class="stat-row hidden" id="totalUsedRow">
      <span class="stat-label">Total</span>
      <span class="stat-value cost" id="totalUsedValue">¥0.00</span>
    </div>
    <!-- Agent 成本分布（仅 ducc 和 zulu）-->
    <div class="agent-costs" id="agentCosts"></div>
  </div>
</div>

<script>
const card = document.getElementById("card");
const headerText = document.getElementById("headerText");
const quotaProgressRow = document.getElementById("quotaProgressRow");
const quotaUsername = document.getElementById("quotaUsername");
const quotaPercent = document.getElementById("quotaPercent");
const quotaProgressFill = document.getElementById("quotaProgressFill");
const totalUsedRow = document.getElementById("totalUsedRow");
const totalUsedValue = document.getElementById("totalUsedValue");
const agentCosts = document.getElementById("agentCosts");

function formatNumber(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1) + "M";
  if (num >= 1000) return (num / 1000).toFixed(1) + "K";
  return num.toString();
}

function updateStats(data) {
  if (!data) return;

  // ── Comate 配额信息（始终显示，无数据时显示 NaN）──
  const hasQuotaData = !!(data.username || data.monthly_used_quota != null);

  if (hasQuotaData) {
    quotaUsername.textContent = data.username || "—";

    const used = data.monthly_used_quota || 0;
    const total = data.permanent_quota || 6000;
    const percentage = total > 0 ? Math.min(100, (used / total) * 100) : 0;

    quotaPercent.textContent = percentage.toFixed(1) + "%";
    quotaProgressFill.style.width = percentage.toFixed(1) + "%";

    // 根据使用率设置颜色
    quotaProgressFill.classList.remove("warning", "critical");
    if (percentage >= 90) quotaProgressFill.classList.add("critical");
    else if (percentage >= 75) quotaProgressFill.classList.add("warning");

    // 显示 Total 已使用费用
    totalUsedValue.textContent = "¥" + used.toFixed(2);
  } else {
    // 无数据时显示占位符
    quotaUsername.textContent = "—";
    quotaPercent.textContent = "--";
    quotaProgressFill.style.width = "0%";
    quotaProgressFill.classList.remove("warning", "critical");
    totalUsedValue.textContent = "--";
  }

  // 始终显示进度条和 Total 行
  quotaProgressRow.classList.remove("hidden");
  totalUsedRow.classList.remove("hidden");

  // ── Agent 成本分布（仅显示 ducc 和 zulu）──
  agentCosts.innerHTML = "";
  if (data.agent_costs && typeof data.agent_costs === "object") {
    const allowedAgents = ["ducc", "zulu"];
    const entries = Object.entries(data.agent_costs).filter(([name]) => allowedAgents.includes(name));

    if (entries.length > 0) {
      for (const [agentName, cost] of entries) {
        if (typeof cost !== "number") continue;

        const itemDiv = document.createElement("div");
        itemDiv.className = "agent-cost-item";

        const labelDiv = document.createElement("div");
        labelDiv.className = "agent-cost-label";
        labelDiv.textContent = agentName + ":";

        const valueDiv = document.createElement("div");
        valueDiv.className = "agent-cost-value";
        valueDiv.textContent = "¥" + cost.toFixed(2);

        itemDiv.appendChild(labelDiv);
        itemDiv.appendChild(valueDiv);
        agentCosts.appendChild(itemDiv);
      }
    } else {
      // 无 agent 数据时显示占位符
      for (const agentName of ["ducc", "zulu"]) {
        const itemDiv = document.createElement("div");
        itemDiv.className = "agent-cost-item";

        const labelDiv = document.createElement("div");
        labelDiv.className = "agent-cost-label";
        labelDiv.textContent = agentName + ":";

        const valueDiv = document.createElement("div");
        valueDiv.className = "agent-cost-value";
        valueDiv.textContent = "--";

        itemDiv.appendChild(labelDiv);
        itemDiv.appendChild(valueDiv);
        agentCosts.appendChild(itemDiv);
      }
    }
  } else {
    // 无 agent_costs 字段时显示占位符
    for (const agentName of ["ducc", "zulu"]) {
      const itemDiv = document.createElement("div");
      itemDiv.className = "agent-cost-item";

      const labelDiv = document.createElement("div");
      labelDiv.className = "agent-cost-label";
      labelDiv.textContent = agentName + ":";

      const valueDiv = document.createElement("div");
      valueDiv.className = "agent-cost-value";
      valueDiv.textContent = "--";

      itemDiv.appendChild(labelDiv);
      itemDiv.appendChild(valueDiv);
      agentCosts.appendChild(itemDiv);
    }
  }

  // Report height for positioning
  requestAnimationFrame(() => {
    const height = document.body.scrollHeight;
    if (window.tokenBubbleAPI?.reportHeight) {
      window.tokenBubbleAPI.reportHeight(height);
    }
  });
}

function show() {
  card.classList.remove("hiding");
  card.classList.add("visible");
}

function hide() {
  card.classList.remove("visible");
  card.classList.add("hiding");
}

// Listen for IPC messages
if (window.tokenBubbleAPI) {
  window.tokenBubbleAPI.onTokenUpdate((data) => {
    updateStats(data);
    show();
  });

  window.tokenBubbleAPI.onHide(() => {
    hide();
  });

  window.tokenBubbleAPI.onLangChange((texts) => {
    if (texts.header) headerText.textContent = texts.header;
  });
}

// Initial state
card.classList.add("visible");
</script>
</body>
</html>
